packages:
  - "apps/*"
  - "packages/*"
  - "shared"
  - "tests"
  - "scripts"
onlyBuiltDependencies:
  - electron
  - esbuild
  - electron-winstaller
catalog:
  "typescript": ~6.0.2
  "vitest": ^2.1.9
  "vite": ^8.0.12
  "tailwindcss": "^4.3.1"
  "@tailwindcss/vite": "^4.3.1"
  "@vitejs/plugin-react": "^6.0.2"
  "@opencode-ai/sdk": "^1.17.3"
  "zustand": "^5.0.14"
allowBuilds:
  electron: false
  electron-winstaller: false
  esbuild: false
  node-pty: true

supplyChain:
  minimumReleaseAge: 0
