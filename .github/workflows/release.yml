name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # node-pty needs node-gyp which requires distutils (gone in py3.12+).
      # Python 3.11 still ships distutils, so pin it for native builds.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pnpm install --frozen-lockfile
        env:
          npm_config_python: python3.11

      - name: Build packages + renderer + main
        run: |
          pnpm --filter @androdex/server build
          pnpm --filter @androdex/desktop build:renderer
          pnpm --filter @androdex/desktop build:main

      - name: Package (electron-builder)
        run: pnpm --filter @androdex/desktop exec electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_python: python3.11

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-binaries
          path: apps/desktop/release/*.*
          if-no-files-found: ignore
