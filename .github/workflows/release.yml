name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Cache Electron + electron-builder downloaded binaries (avoid 113MB re-download)
      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-builder

      # node-pty 1.1.0 ships prebuilds (real TTY binaries) — use them, don't compile.
      # build_from_source=false keeps the prebuild path (no MSVC / no Python needed).
      - name: Install deps
        run: pnpm install --frozen-lockfile
        env:
          npm_config_build_from_source: "false"

      # pnpm copies node-pty prebuilds with 644 perms on macOS (node-pty issue #850,
      # unfixed in 1.1.0). chmod the spawn-helper so it's executable at runtime.
      - name: Fix node-pty spawn-helper perms (pnpm/macOS #850)
        if: runner.os == 'macOS'
        run: find node_modules/.pnpm -path '*node-pty*/prebuilds/darwin-*' -name spawn-helper -exec chmod +x {} +

      - name: Build packages + renderer + main
        run: |
          pnpm --filter @androdex/server build
          pnpm --filter @androdex/desktop build:renderer
          pnpm --filter @androdex/desktop build:main

      - name: Package (electron-builder)
        run: pnpm --filter @androdex/desktop exec electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-binaries
          path: apps/desktop/release/*.*
          if-no-files-found: ignore
