appId: com.androdex.app
productName: Androdex
copyright: Copyright © 2025 Androdex

# Faster packaging in CI (no slow NSIS compression). Tradeoff: larger installer.
compression: store

directories:
  output: release
  buildResources: build

# node-pty 1.1.0 ships N-API prebuilds (ABI-stable, work in Electron 39).
# Skip electron-builder's native rebuild — it forces node-gyp 9 (distutils bug).
npmRebuild: false

files:
  - dist/**
  - node_modules/**
  - package.json

# Bundle the opencode CLI so users don't need to install it separately.
# The CI workflow downloads the per-OS binary into resources/opencode/.
extraResources:
  - from: resources/opencode
    to: opencode
    filter:
      - "**/*"

extraMetadata:
  main: dist/main/index.js

publish:
  provider: github
  owner: androdotdev
  repo: androdex
  releaseType: release

win:
  target:
    - target: nsis
      arch: [x64, arm64]
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: build/icon.icns
  category: public.app-category.developer-tools

dmg:
  writeUpdateInfo: false

linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
  icon: build/icon.png
  category: Development
