appId: com.androdex.app
productName: Androdex
copyright: Copyright © 2025 Androdex

directories:
  output: release
  buildResources: build

files:
  - dist/**
  - node_modules/**
  - package.json

extraMetadata:
  main: dist/main/index.js

publish:
  provider: github
  owner: androdotdev
  repo: androdex
  releaseType: release

win:
  target:
    - target: nsis
      arch: [x64, arm64]
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: build/icon.icns
  category: public.app-category.developer-tools

dmg:
  writeUpdateInfo: false

linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
  icon: build/icon.png
  category: Development
