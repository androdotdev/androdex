name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    env:
      # node-gyp 11 (forced via pnpm.overrides) handles VS2022 detection.
      # mac: pin py3.11 (distutils) for node-pty native build.
      npm_config_msvs_version: ${{ matrix.platform == 'win' && '2022' || '' }}
      npm_config_python: ${{ matrix.platform == 'mac' && 'python3.11' || 'python3' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # node-pty native build needs node-gyp + a Python with distutils (gone in py3.12+).
      # Pin 3.11 on macOS so node-gyp picks it up.
      - name: Setup Python 3.11 (mac)
        if: matrix.platform == 'mac'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build packages + renderer + main
        run: |
          pnpm --filter @androdex/server build
          pnpm --filter @androdex/desktop build:renderer
          pnpm --filter @androdex/desktop build:main

      - name: Package (electron-builder)
        run: pnpm --filter @androdex/desktop exec electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-binaries
          path: apps/desktop/release/*.*
          if-no-files-found: ignore
